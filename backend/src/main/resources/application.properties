spring.application.name=backend

# PostgreSQL (see docker-compose.yml at the repo root: `docker compose up -d`).
spring.datasource.url=jdbc:postgresql://localhost:5433/eclinician
spring.datasource.username=eclinician
spring.datasource.password=eclinician

# Hibernate manages the schema for now; we'll move to migrations before prod.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
