services:
  postgres:
    image: postgres:16
    container_name: eclinician-postgres
    environment:
      POSTGRES_DB: eclinician
      POSTGRES_USER: eclinician
      POSTGRES_PASSWORD: eclinician
    ports:
      # Host 5433 to avoid clashing with a native Postgres on 5432.
      - "5433:5432"
    volumes:
      - eclinician-pgdata:/var/lib/postgresql/data

volumes:
  eclinician-pgdata:
